# coturn config for agentspeak browser-mode WebRTC media relay.
# Runs with host networking so relay UDP ports are reachable on the VPS.

listening-port=3478
listening-ip=0.0.0.0

# The VPS public IP. coturn advertises this as the relay address in its
# candidates, so the browser sends RTP to a reachable address.
external-ip=45.195.159.250
relay-ip=45.195.159.250

# Long-term credentials (must match TURN_USER / TURN_PASS the server hands
# the browser in the /connect answer).
lt-cred-mech
user=agentspeak:agentspeak
realm=agentspeak.com

# Relay port range coturn hands out for media. Keep it modest and make sure
# these UDP ports are open in the VPS firewall / cloud security group.
min-port=49160
max-port=49200

# Lock things down a bit.
no-cli
no-tls
no-dtls
fingerprint

# Don't relay to internal/loopback ranges — TURN should only ferry real media.
no-loopback-peers
no-multicast-peers