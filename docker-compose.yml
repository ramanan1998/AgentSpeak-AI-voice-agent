services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - minio

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host          # TURN relay needs real host UDP ports, not bridge
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  server:
    build: .
    image: voiceagent:latest
    restart: unless-stopped
    env_file: .env
    working_dir: /app                       # flat imports: database, models, config
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    volumes:
      - ./server/alembic/versions:/app/alembic/versions
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address "0.0.0.0:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://storage.agentspeak.com
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  minio_data: